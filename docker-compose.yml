services:

  # ── MCP Server ──────────────────────────────────────────────────────────────
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-banorte
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
      MCP_SERVER_NAME: "mcp-banorte"
      FILES_BASE_DIR: "/app/data"
      OUTPUT_DIR: "/app/output"
      LOG_LEVEL: "INFO"
      # Variables de API — sobreescribe con valores reales en .env
      BANORTE_API_BASE_URL: "${BANORTE_API_BASE_URL:-}"
      BANORTE_API_KEY: "${BANORTE_API_KEY:-}"
      BANORTE_API_SECRET: "${BANORTE_API_SECRET:-}"
    volumes:
      - ./data:/app/data        # SQLite (.db) + archivos de entrada
      - ./output:/app/output    # PPTX, PDFs y cualquier archivo generado
